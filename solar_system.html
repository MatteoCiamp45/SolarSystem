<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGL Solar System</title>
  <link rel="icon" href="/resources/images/favicon.png" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }
    
    #menuBtn{
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;

      padding: 10px 16px;
      background: rgba(20,40,70,0.8);
      color: #e8f4ff;
      border: 1px solid rgba(74,144,217,.4);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: .1em;
    }

    #menuBtn:hover{
      background: rgba(74,144,217,.3);
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease;
    }

    #loadingOverlay span {
      color: #fff;
      font-family: sans-serif;
      font-size: 20px;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <canvas id="glCanvas"></canvas>

  <div id="loadingOverlay">
  <span>CARICAMENTO...</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       VERTEX SHADER — Pianeti (area light + texture)
  ═══════════════════════════════════════════════ -->
  <script id="vs-sphere" type="x-shader/x-vertex">
    attribute vec3 a_position;          // posizione vertice nello spazio locale (x, y, z)
    attribute vec3 a_normal;            // normale vertice nello spazio locale (x, y, z)
    attribute vec2 a_texcoord;          // coordinate UV vertice (u, v)

    uniform mat4 u_world;               // matrice di trasformazione da spazio locale a spazio mondo
    uniform mat4 u_view;                // matrice di trasformazione da spazio mondo a spazio vista (camera)
    uniform mat4 u_projection;          // prospettiva (frustum)
    uniform vec3 u_viewWorldPosition;   // posizione camera nello spazio mondo (x, y, z)

    varying vec3 v_normal;              // normale trasformata nello spazio mondo
    varying vec3 v_worldPos;            // posizione vertice trasformata nello spazio mondo
    varying vec3 v_surfaceToView;       // vettore superficie -> camera (per specular)
    varying vec2 v_texcoord;            // coordinate UV per campionamento texture

    void main() {
      // calcolo posizione nello spazio mondo
      vec4 worldPosition = u_world * vec4(a_position, 1.0);

      // calcolo posizione finale del vertice nello spazio clip
      gl_Position        = u_projection * u_view * worldPosition;

      // trasformo la normale nello spazio mondo (senza traslazione, quindi mat3)
      v_normal           = mat3(u_world) * a_normal;

    
      v_worldPos         = worldPosition.xyz;

      // vettore dalla superficie verso la camera (usato per riflessi speculari)
      v_surfaceToView    = u_viewWorldPosition - worldPosition.xyz;

      v_texcoord         = a_texcoord;
    }
  </script>

  <!-- ═══════════════════════════════════════════════
       FRAGMENT SHADER — Pianeti (area light + texture)
  ═══════════════════════════════════════════════ -->
  <script id="fs-sphere" type="x-shader/x-fragment">
    precision mediump float;

    #define NUM_SAMPLES 16

    uniform vec3      u_color;                        // colore base (se non c'è la texture)
    uniform float     u_shininess;                    // fattore di brillantezza riflessi
    uniform vec3      u_lightSamples[NUM_SAMPLES];
    uniform sampler2D u_texture;                      // map_Kd
    uniform sampler2D u_specTexture;                  // map_Ks
    uniform int       u_hasTexture;                   // flag texture

    varying vec3 v_normal;
    varying vec3 v_worldPos;
    varying vec3 v_surfaceToView;
    varying vec2 v_texcoord;

    void main() {
      // I varyings interpolati dalla GPU perdono la lunghezza unitaria: rinormalizzare
      vec3 normal           = normalize(v_normal);
      vec3 surfaceToViewDir = normalize(v_surfaceToView);

      /* Colore: texture se disponibile, altrimenti u_color */
      vec3 baseColor = u_color;
      if (u_hasTexture == 1) {
        baseColor = texture2D(u_texture, v_texcoord).rgb;
      }

    
      // Luce ambientale
      vec3 color = 0.05 * baseColor;

      /* Contributo di tutti i campioni sulla superficie */
      for (int i = 0; i < NUM_SAMPLES; i++) {
        vec3  toLight  = u_lightSamples[i] - v_worldPos;                        // vettore verso il campione di luce
        float dist     = length(toLight);
        vec3  lightDir = toLight / dist;                                        // direzione normalizzata

        //float atten = 2.0 / (1.0 + 0.005 * dist + 0.004 * dist * dist);
        float atten = 1.0 / (1.0 + 0.0001 * dist);                              // attenuazione

        /* Diffuse */
        float diff = max(dot(normal, lightDir), 0.0);                           // fattore di diffusione (0 se luce dietro la superficie)
        color += diff * baseColor * atten / float(NUM_SAMPLES);                 // contributo del campione

      }

      /* Componente speculare: campione centrale del Sole (approssimazione) */
      vec3 mainLightDir = normalize(-v_worldPos);                               // direzione verso origine (Sole)

      float specMask = texture2D(u_specTexture, v_texcoord).r;

      float dist = length(v_worldPos);

      /* Intensità speculare */
      float specIntensity = 1.0 / (1.0 + 0.002 * dist * dist);                  // attenuazione più forte vicino al Sole

      /* Highlight più largo vicino al Sole */
      float dynamicShininess = u_shininess * clamp(dist / 25.0, 0.15, 1.0);

      /* halfway vector */
      vec3 hv = normalize(mainLightDir + surfaceToViewDir);

      //float spec = pow(
      //    max(dot(normal, hv), 0.0),
      //    dynamicShininess
      //);

      float spec = 0.0;
      if (dynamicShininess > 0.0) {
        spec = pow(
            max(dot(normal, hv), 0.0),
            dynamicShininess
        );
      }

      color += spec * specMask * specIntensity;

      gl_FragColor = vec4(color, 1.0);
    }
  </script>

  <!-- ═══════════════════════════════════════════════
       VERTEX SHADER — Sole emissivo (con texture)
  ═══════════════════════════════════════════════ -->
  <script id="vs-emissive" type="x-shader/x-vertex">
    attribute vec3 a_position;
    attribute vec2 a_uv;

    uniform mat4 u_world;
    uniform mat4 u_view;
    uniform mat4 u_projection;

    varying vec2 v_uv;

    void main() {
      gl_Position = u_projection * u_view * u_world * vec4(a_position, 1.0);
      v_uv = a_uv;
    }
  </script>

  <!-- ═══════════════════════════════════════════════
       FRAGMENT SHADER — Sole emissivo (con texture)
  ═══════════════════════════════════════════════ -->
  <script id="fs-emissive" type="x-shader/x-fragment">
    precision mediump float;

    uniform vec3      u_color;
    uniform sampler2D u_texture;
    uniform int       u_hasTexture;

    varying vec2 v_uv;

    void main() {
      vec3 texColor = u_color;
      if (u_hasTexture == 1) {
        texColor = texture2D(u_texture, v_uv).rgb;
      }
      /* Moltiplicatore emissivo per farlo brillare */
      gl_FragColor = vec4(texColor * 2.5, 1.0);
    }
  </script>

  <!-- ═══════════════════════════════════════════════
       VERTEX SHADER — Skybox
  ═══════════════════════════════════════════════ -->
  <script id="vs-skybox" type="x-shader/x-vertex">
    attribute vec3 a_position;
    uniform mat4 u_projection;
    uniform mat4 u_view;
    varying vec3 v_texCoord;

    void main() {
      v_texCoord  = a_position;
      vec4 pos    = u_projection * u_view * vec4(a_position, 1.0);
      gl_Position = pos.xyww;
    }
  </script>

  <!-- ═══════════════════════════════════════════════
       FRAGMENT SHADER — Skybox
  ═══════════════════════════════════════════════ -->
  <script id="fs-skybox" type="x-shader/x-fragment">
    precision mediump float;
    uniform samplerCube u_skybox;
    varying vec3 v_texCoord;

    void main() {
      gl_FragColor = textureCube(u_skybox, v_texCoord);
    }
  </script>

  <script src="load2_mesh.js"></script>
  <script src="config.js"></script>
  <script src="camera.js"></script>
  <!-- Script principale -->
  <script src="main.js"></script>

  <button id="menuBtn" onclick="apriMenu()">MENU</button>

  <script>
  function apriMenu(){
    window.location.href = "menu.html";
  }
  </script>

</body>
</html>
